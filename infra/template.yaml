AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Complete Serverless SPA infrastructure with CloudFront, S3, and Route 53 DNS.

Parameters:
  DomainName:
    Type: String
    Default: "none"
    Description: "The custom domain (e.g., example.com). Required for Route 53 migration."
  UseCustomDomain:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: "Set to 'true' to enable the ACM certificate and Route 53 records."
  ZOHOCLIENTID:
    Type: String
    NoEcho: true
  ZOHOCLIENTSECRET:
    Type: String
    NoEcho: true
  ZOHOACCESSTOKEN:
    Type: String
  ZOHOREFRESHTOKEN:
    Type: String
    NoEcho: true
  STRIPESECRETKEY:
    Type: String
    NoEcho: true

Conditions:
  EnableCustomDomain: !Equals [ !Ref UseCustomDomain, "true" ]

Resources:
  #------------ roles
  # --- DNS & SSL RESOURCES ---

  # 1. Route 53 Hosted Zone (You will get Nameservers from this to put in IONOS)
  WebsiteHostedZone:
    Type: AWS::Route53::HostedZone
    Condition: EnableCustomDomain
    Properties:
      Name: !Ref DomainName

  # 2. SSL Certificate (Automatically validates via DNS in the new Hosted Zone)
  WebsiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: EnableCustomDomain
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Sub "*.${DomainName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref WebsiteHostedZone

  # --- FRONTEND RESOURCES ---

  # 3. Private S3 Bucket (Public access blocked; only CloudFront accesses via OAC)
  HostingBucket:  
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-hosting-bucket
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${AWS::StackName}-OAC
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # 4. CloudFront Distribution
  WebsiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Aliases: !If [EnableCustomDomain, [!Ref DomainName, !Sub "www.${DomainName}"], !Ref "AWS::NoValue"]
        
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

        Origins:
          - Id: S3Origin
            DomainName: !GetAtt HostingBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
        
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Optimized Caching Policy

        ViewerCertificate: !If 
          - EnableCustomDomain
          - AcmCertificateArn: !Ref WebsiteCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

  # 5. Secure S3 Bucket Policy (Allows ONLY CloudFront to read)
  HostingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref HostingBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${HostingBucket}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebsiteDistribution}

  # 6. Route 53 Records (Apex and WWW Alias)
  ApexRecord:
    Type: AWS::Route53::RecordSet
    Condition: EnableCustomDomain
    Properties:
      HostedZoneId: !Ref WebsiteHostedZone
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt WebsiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2 # Static ID for CloudFront

  WWWRecord:
    Type: AWS::Route53::RecordSet
    Condition: EnableCustomDomain
    Properties:
      HostedZoneId: !Ref WebsiteHostedZone
      Name: !Sub "www.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt WebsiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  # --- BACKEND RESOURCES ---

  DataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-data-table
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
  
  WorkerLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-worker
      Handler: worker.handler
      Runtime: nodejs20.x
      Timeout: 60
      CodeUri: ../apps/backend/dist/
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !Ref STRIPESECRETKEY
          ZOHO_CLIENT_ID: !Ref ZOHOCLIENTID
          ZOHO_CLIENT_SECRET: !Ref ZOHOCLIENTSECRET
          ZOHO_ACCESS_TOKEN: !Ref ZOHOACCESSTOKEN
          ZOHO_REFRESH_TOKEN: !Ref ZOHOREFRESHTOKEN
          TABLE_NAME: !Ref DataTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DataTable 

  APIFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-function
      Runtime: nodejs20.x
      Handler: index.handler
      CodeUri: ../apps/backend/dist/
      Layers:
        - !ImportValue CommonLayerArn
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          WORKER_ARN: !GetAtt WorkerLambda.Arn
          DOMAIN: !Ref DomainName
          ZOHO_CLIENT_ID: !Ref ZOHOCLIENTID
          ZOHO_CLIENT_SECRET: !Ref ZOHOCLIENTSECRET
          ZOHO_ACCESS_TOKEN: !Ref ZOHOACCESSTOKEN
          ZOHO_REFRESH_TOKEN: !Ref ZOHOREFRESHTOKEN
          STRIPE_SECRET_KEY: !Ref STRIPESECRETKEY
          TABLE_NAME: !Ref DataTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DataTable
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt WorkerLambda.Arn 

Outputs:
  CloudFrontURL:
    Value: !GetAtt WebsiteDistribution.DomainName
    
  DistributionID:
    Value: !GetAtt WebsiteDistribution.Id
  
  Nameservers:
    Description: "Copy these 4 values into your IONOS Nameserver settings"
    Condition: EnableCustomDomain
    Value: !Join [", ", !GetAtt WebsiteHostedZone.NameServers]
  
  LambdaAPIUrl:
    Value: !GetAtt APIFunctionUrl.FunctionUrl
